<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Info Form</title>
    <style>
        body{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: large;
            padding: 5px;
            padding-left: 30px;
        }
    </style>
</head>
<body>
    <h2>USER - INFO FORM </h2>
    <label>First Name:</label><br>
    <input type = "text"><br><br>

    <label>Last Name:</label><br>
    <input type = "text"><br><br>

    <label>E-mail:</label><br>
    <input type = "text"><br><br>


    <label>Interests:</label><br>
    <input type="checkbox" id="interest1" value="coding">
    <label for="interest1">Coding</label><br>

    <input type="checkbox" id="interest2" value="music">
    <label for="interest2">Music</label><br>
    
    <input type="checkbox" id="interest3" value="sports">
    <label for="interest3">Sports</label><br><br>

    <label>Gender:</label><br>
    <input type="radio" id="Male">
    <label for="male">Male</label><br>

    <input type="radio" id="Female">
    <label for="Female">Female</label><br>

    <input type="radio" id="Others">
    <label for="Others">Others</label><br><br>

    <label>Comments:</label><br>
    <textarea for="Comments" rows="4" cols="50"></textarea><br><br>

    <label>Select your country:</label><br>
    <select for="Select your country">
        <option>--Please choose an option--</option><br>
        <option>India</option><br>
        <option>U.S.A</option>
        <option>Malaysia</option>

    </select> <br><br>
    <button>SUBMIT</button>



    
</body>
</html>
