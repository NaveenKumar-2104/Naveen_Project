<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Input Form</title>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    th {
      cursor: pointer;
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>
  <h2>User Information Form</h2>
  <form id="userForm">
    <label for="firstname">First Name:</label><br>
    <input type="text" id="firstname" name="firstname" required><br><br>

    <label for="lastname">Last Name:</label><br>
    <input type="text" id="lastname" name="lastname" required><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label>Interests:</label><br>
    <input type="checkbox" id="interest1" name="interests" value="coding">
    <label for="interest1">Coding</label><br>
    <input type="checkbox" id="interest2" name="interests" value="music">
    <label for="interest2">Music</label><br>
    <input type="checkbox" id="interest3" name="interests" value="sports">
    <label for="interest3">Sports</label><br><br>

    <label>Gender:</label><br>
    <input type="radio" id="male" name="gender" value="male" required>
    <label for="male">Male</label><br>
    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label><br>
    <input type="radio" id="other" name="gender" value="other">
    <label for="other">Other</label><br><br>

    <label for="comment">Comments:</label><br>
    <textarea id="comment" name="comment" rows="4" cols="50"></textarea><br><br>

    <label for="country">Select your country:</label><br>
    <select id="country" name="country" required>
      <option value="">--Please choose an option--</option>
      <option value="usa">USA</option>
      <option value="india">India</option>
      <option value="uk">UK</option>
      <option value="canada">Canada</option>
    </select><br><br>

    <input type="submit" value="Submit">
  </form>

  <h2>Submitted Data</h2>
  <table id="dataTable">
    <thead>
      <tr>
        <th onclick="sortTable(0)">First Name</th>
        <th onclick="sortTable(1)">Last Name</th>
        <th onclick="sortTable(2)">Email</th>
        <th onclick="sortTable(3)">Interests</th>
        <th onclick="sortTable(4)">Gender</th>
        <th onclick="sortTable(5)">Comment</th>
        <th onclick="sortTable(6)">Country</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>
