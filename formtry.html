<!DOCTYPE html>
<html>
<head>
  <title>First Name Validation</title>
  <style>
    span {
      color: red;
      font-size: 12px;
      margin-left: 10px;
    }
  </style>
</head>
<body>

  <form onsubmit="validate(event)">
    <label for="fname">First Name:</label>
    <input type="text" id="fname"><br><br>
    <button type="submit">Submit</button>
  </form>

  <script>
    function validate(e) {
      e.preventDefault(); // Stop form from refreshing the page

      const fname = document.getElementById("fname");
      const spanId = "fname-error";
      const existingSpan = document.getElementById(spanId);

      if (!fname.value.trim()) {
        if (!existingSpan) {
          const span = document.createElement("span");
          span.id = spanId;
          span.textContent = "First name is required!";
          fname.after(span);
        }
      } else {
        if (existingSpan) {
          existingSpan.remove();
        }
      }
    }
  </script>

</body>
</html>
