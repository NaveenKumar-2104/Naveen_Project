<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form with Validation and Table</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    form { margin-bottom: 20px; }
    input, textarea, button, select { margin: 5px 0; padding: 8px; width: 300px; }
    input[type="radio"], input[type="checkbox"] { width: auto; }
    .form-group { margin-bottom: 10px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f4f4f4; }
    .error { color: red; font-size: 0.9em; }
  </style>
</head>
<body>

  <h2>User Form</h2>
  <form id="userForm">
    <div class="form-group">
      <label>Name:</label><br>
      <input type="text" id="name" required>
      <div id="nameError" class="error"></div>
    </div>

    <div class="form-group">
      <label>Email:</label><br>
      <input type="email" id="email" required>
      <div id="emailError" class="error"></div>
    </div>

    <div class="form-group">
      <label>Gender:</label><br>
      <input type="radio" name="gender" value="Male"> Male
      <input type="radio" name="gender" value="Female"> Female
      <input type="radio" name="gender" value="Other"> Other
      <div id="genderError" class="error"></div>
    </div>

    <div class="form-group">
      <label>Interests:</label><br>
      <input type="checkbox" name="interests" value="Reading"> Reading
      <input type="checkbox" name="interests" value="Traveling"> Traveling
      <input type="checkbox" name="interests" value="Sports"> Sports
      <input type="checkbox" name="interests" value="Music"> Music
    </div>

    <div class="form-group">
      <label>Comments:</label><br>
      <textarea id="comments" rows="4"></textarea>
    </div>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
  </form>

  <h3>Submitted Data</h3>
  <table id="dataTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Gender</th>
        <th>Interests</th>
        <th>Comments</th>
      </tr>
    </thead>
    <tbody>
      <!-- Submitted data will appear here -->
    </tbody>
  </table>

  <script>
    const form = document.getElementById('userForm');
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const commentsInput = document.getElementById('comments');
    const nameError = document.getElementById('nameError');
    const emailError = document.getElementById('emailError');
    const genderError = document.getElementById('genderError');
    const tableBody = document.getElementById('dataTable').querySelector('tbody');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      // Reset errors
      nameError.textContent = '';
      emailError.textContent = '';
      genderError.textContent = '';

      let valid = true;

      if (nameInput.value.trim() === '') {
        nameError.textContent = 'Name is required.';
        valid = false;
      }

      if (emailInput.value.trim() === '') {
        emailError.textContent = 'Email is required.';
        valid = false;
      } else if (!emailInput.value.includes('@')) {
        emailError.textContent = 'Invalid email format.';
        valid = false;
      }

      const gender = form.querySelector('input[name="gender"]:checked');
      if (!gender) {
        genderError.textContent = 'Gender is required.';
        valid = false;
      }

      if (!valid) return;

      // Collect interests
      const interests = Array.from(form.querySelectorAll('input[name="interests"]:checked'))
                            .map(checkbox => checkbox.value)
                            .join(', ');

      // Add to table
      const row = tableBody.insertRow();
      row.insertCell(0).textContent = nameInput.value;
      row.insertCell(1).textContent = emailInput.value;
      row.insertCell(2).textContent = gender.value;
      row.insertCell(3).textContent = interests || 'None';
      row.insertCell(4).textContent = commentsInput.value || '—';

      // Reset the form
      form.reset();
    });
  </script>

</body>
</html>
