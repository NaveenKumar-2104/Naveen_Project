<h1>Guess Number</h1>
<input id="GuessNum">
<button onclick="Check()">CHECK</button>
<p id="Res">You are Wrong/Right</p>
<p id="Score">SCORE:5</p>
<script>
    var GuessNum = document.getElementById("GuessNum")
    var Res = document.getElementById("Res")
    var Score = document.getElementById("Score")
    var RanNum = (Math.floor(Math.random()*10)+1)<=5
    var totalscore = 5
    function Check()
    {
        var EnterNum = GuessNum.value 
        if(RanNum == EnterNum)
    {
        console.log("Right")
        Res.textContent = "You are Right"
        alert("YOU WON...")
        
    }else
    {Res.textContent = "You are Wrong"
    totalscore = totalscore - 1
    Score.textContent = "Score: "+totalscore
    alert("YOU LOSE...")
    if (totalscore == 0)
    {
       (alert("GAME OVER...")) 
    }
    
    }
    }
</script>
